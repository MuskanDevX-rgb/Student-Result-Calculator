<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>
                <i class="fa-solid fa-graduation-cap"></i>
                Student Result Calculator
            </h1>

            <p id="dateTime"></p>

        </div>

        <!-- Student Details -->

        <div class="form">

            <label>Student Name</label>
            <input type="text" id="name" placeholder="Enter Student Name">

            <label>Subject 1 Marks</label>
            <input type="number" id="sub1" placeholder="0 - 100">

            <label>Subject 2 Marks</label>
            <input type="number" id="sub2" placeholder="0 - 100">

            <label>Subject 3 Marks</label>
            <input type="number" id="sub3" placeholder="0 - 100">

            <label>Subject 4 Marks</label>
            <input type="number" id="sub4" placeholder="0 - 100">

            <label>Subject 5 Marks</label>
            <input type="number" id="sub5" placeholder="0 - 100">

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button onclick="calculateResult()">
                <i class="fa-solid fa-calculator"></i>
                Calculate
            </button>

            <button onclick="resetData()">
                <i class="fa-solid fa-rotate"></i>
                Reset
            </button>

            <button onclick="darkMode()">
                🌙 Dark Mode
            </button>

            <button onclick="window.print()">
                🖨 Print
            </button>

        </div>

        <!-- Result -->

        <div class="result">

            <h2>Student Report Card</h2>

            <hr>

            <p>
                <strong>Name :</strong>
                <span id="studentName">-</span>
            </p>

            <p>
                <strong>Total Marks :</strong>
                <span id="total">-</span>
            </p>

            <p>
                <strong>Percentage :</strong>
                <span id="percentage">-</span>
            </p>

            <!-- Progress Bar -->

            <div class="progress">

                <div class="progress-bar" id="progressBar">
                    0%
                </div>

            </div>

            <p>
                <strong>Grade :</strong>
                <span id="grade">-</span>
            </p>

            <p>
                <strong>Performance :</strong>
                <span id="performance">-</span>
            </p>

            <p>
                <strong>Status :</strong>
                <span id="status">-</span>
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
